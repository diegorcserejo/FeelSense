<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Detecção de Emoções</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .video-container {
            position: relative;
            width: 640px;
            height: 480px;
        }
        #webcam-video, #overlay-canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>
<body>
    <h1>Detectando Emoções</h1>
    <div class="video-container">
        <video id="webcam-video" width="640" height="480" autoplay></video>
        <canvas id="overlay-canvas" width="640" height="480"></canvas>
    </div>
    <p id="emotion-result">Aguardando...</p>
    
    <canvas id="hidden-canvas" width="640" height="480" style="display: none;"></canvas>
    
    <div class="chart-container">
        <h2>Distribuição de Emoções</h2>
        <canvas id="emotion-chart"></canvas>
    </div>

    <button id="end-analysis-btn">Finalizar Análise e Gerar Laudo</button>

    <div id="laudo-container" style="display: none;">
        <h2>Laudo da Análise de Emoções</h2>
        <p id="laudo-text"></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
